<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debtflix | Stay Cozy</title>
    <style>
        :root {
            --primary: #d4a373; /* Warm Amber */
            --bg: #1a1614;      /* Espresso Black */
            --card-bg: #2a2420;
            --accent: #bc6c25;
            --text: #fefae0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Georgia', serif; /* Softer, book-like font */
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        .nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; z-index: 1000;
            background: linear-gradient(to bottom, rgba(26,22,20,0.9), transparent);
            backdrop-filter: blur(5px);
        }
        .nav-brand { 
            color: var(--primary); 
            font-size: 2rem; 
            font-weight: 900; 
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(212, 163, 115, 0.3);
        }

        .profile-area {
            display: flex; align-items: center; gap: 15px;
        }
        
        #userBadge {
            width: 38px; height: 38px; 
            background: var(--accent); 
            border-radius: 50%; /* Rounded for cozy feel */
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: bold;
            border: 2px solid var(--primary);
        }

        /* --- COZY HERO --- */
        .hero {
            position: relative;
            height: 75vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid var(--card-bg);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--bg) 10%, rgba(26,22,20,0.4) 50%, var(--bg) 95%),
                        linear-gradient(to top, var(--bg), transparent 40%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 550px;
        }

        .hero-content h1 { font-size: 3.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        .hero-content p { font-size: 1.1rem; color: #ccc; margin-bottom: 2rem; font-style: italic; }

        .btn-play {
            background: var(--primary);
            color: var(--bg);
            padding: 14px 35px;
            border: none;
            border-radius: 50px; /* Pill shape */
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-play:hover { background: var(--text); transform: translateY(-2px); }

        /* --- SHELVES --- */
        .row { padding: 40px 5% 0; }
        .row-title { 
            font-size: 1.6rem; 
            margin-bottom: 20px; 
            color: var(--primary);
            border-left: 3px solid var(--accent);
            padding-left: 15px;
        }
        
        .slider {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 30px;
        }
        .slider::-webkit-scrollbar { height: 4px; }
        .slider::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; }

        .card {
            min-width: 220px;
            height: 320px;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card:hover { transform: scale(1.03) translateY(-10px); }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: sepia(20%); }

        /* --- PLAYER --- */
        #playerModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            padding: 40px;
        }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 50px; color: var(--primary); cursor: pointer; }

        .hidden { display: none !important; }

        #authOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 3000;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div style="text-align: center;">
        <h1 style="color: var(--primary); font-size: 3rem; margin-bottom: 20px;">Debtflix</h1>
        <button class="btn-play" onclick="login()">Start Watching</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-brand">DEBTFLIX</div>
    <div class="profile-area">
        <span id="displayUsername" style="font-size: 0.9rem; opacity: 0.8;"></span>
        <div id="userBadge" onclick="changeProfile()">?</div>
    </div>
</nav>

<section class="hero" id="heroBox">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 id="heroTitle">Spider-Man: No Way Home</h1>
        <p id="heroDesc">A multiverse journey from the comfort of your couch.</p>
        <button class="btn-play" onclick="playHero()">▶ Relax & Watch</button>
    </div>
</section>

<main>
    <div class="row hidden" id="continueSection">
        <h2 class="row-title">Pick Up Where You Left Off</h2>
        <div class="slider" id="continueSlider"></div>
    </div>

    <div class="row">
        <h2 class="row-title">Cozy Collection</h2>
        <div class="slider" id="mainLibrary"></div>
    </div>
</main>

<div id="playerModal">
    <span class="close-btn" onclick="closePlayer()">&times;</span>
    <iframe id="playerFrame" width="100%" height="100%" frameborder="0" allowfullscreen style="border-radius: 20px; box-shadow: 0 0 50px var(--primary);"></iframe>
</div>

<script>
    // --- DATA ---
    const films = [
        { title: "Spider-Man: No Way Home", img: "./Movie Night+_files/Spider_man.png", url: "https://drive.google.com/file/d/1nz8zyXltiKC4F3c8Aen7q_rYIOaLdqB3/preview" },
        { title: "Wonder Woman 1984", img: "./Movie Night+_files/WW84.jpg", url: "https://drive.google.com/file/d/17GVYW1g3tVJdJnjY0kvCZJIidjrg4uxF/preview" },
        { title: "Five Nights at Freddy's", img: "./Movie Night+_files/FNAF.jpg", url: "https://drive.google.com/file/d/18RUfgYZVOgKdHVQTZpVq1RSZGVv2dWY-/preview" },
        { title: "Iron Man", img: "./Movie Night+_files/Iron man.jpg", url: "https://drive.google.com/file/d/1IO1JcSdcN9hbe8kxU9yuJRKygqZIHChh/preview" },
        { title: "The Bad Guys", img: "./Movie Night+_files/badguys1.jpg", url: "https://drive.google.com/file/d/15bbwHMR5jqkG-TJUqPg0myDQBLkxvTM3/preview" },
        { title: "The Bad Guys 2", img: "./Movie Night+_files/badguys2.jpg", url: "https://drive.google.com/file/d/176si3pT-sGF9xyLA7OpRbYRoQXT710z7/preview" }
    ];

    let user = localStorage.getItem("debtflix_user") || "Guest";

    function init() {
        document.getElementById('userBadge').innerText = user.charAt(0);
        document.getElementById('displayUsername').innerText = `Hello, ${user}`;
        document.getElementById('heroBox').style.backgroundImage = `url('${films[0].img}')`;
        renderMain();
        loadHistory();
    }

    function login() {
        localStorage.setItem("debtflix_active", "true");
        document.getElementById('authOverlay').classList.add('hidden');
    }

    function renderMain() {
        const container = document.getElementById('mainLibrary');
        container.innerHTML = films.map(f => `
            <div class="card" onclick="startMovie('${f.url}', '${f.title}', '${f.img}')">
                <img src="${f.img}" alt="${f.title}">
            </div>
        `).join('');
    }

    function startMovie(url, title, img) {
        document.getElementById('playerFrame').src = url;
        document.getElementById('playerModal').style.display = 'block';
        
        // Save to User History
        let history = JSON.parse(localStorage.getItem(`${user}_history`) || "[]");
        history = history.filter(m => m.title !== title);
        history.unshift({title, url, img});
        localStorage.setItem(`${user}_history`, JSON.stringify(history.slice(0, 6)));
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem(`${user}_history`) || "[]");
        const section = document.getElementById('continueSection');
        if (history.length > 0) {
            section.classList.remove('hidden');
            document.getElementById('continueSlider').innerHTML = history.map(f => `
                <div class="card" onclick="startMovie('${f.url}', '${f.title}', '${f.img}')">
                    <img src="${f.img}" alt="${f.title}">
                </div>
            `).join('');
        }
    }

    function changeProfile() {
        const name = prompt("Enter your name:", user);
        if(name) {
            localStorage.setItem("debtflix_user", name);
            location.reload();
        }
    }

    function closePlayer() {
        document.getElementById('playerFrame').src = '';
        document.getElementById('playerModal').style.display = 'none';
    }

    function playHero() {
        startMovie(films[0].url, films[0].title, films[0].img);
    }

    window.onload = () => {
        if(localStorage.getItem("debtflix_active")) document.getElementById('authOverlay').classList.add('hidden');
        init();
    };
</script>

</body>
</html>
